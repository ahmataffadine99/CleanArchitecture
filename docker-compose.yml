services:
  db:
    image: postgres:15-alpine
    container_name: ecoeats-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: affadine
      POSTGRES_DB: ecoeats
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
